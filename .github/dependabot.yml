version: 2
updates:
  # Weekly npm dependency + security updates. (Dependabot security alerts/fixes are
  # also enabled at the repo level; this schedules regular version-update PRs too.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # Keep GitHub Actions pinned/patched too (harmless if no workflows yet).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
