[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# OCTO API proxy functions will live here (see build sequence step 7).
[functions]
  directory = "netlify/functions"

# --- Legacy Craft URL redirects (301) -----------------------------------------
# Map old Craft CMS URLs to their new homes so inbound links and Search Console
# equity are preserved. All permanent (301). `force` is intentionally OMITTED
# (defaults to false) so a redirect NEVER shadows a real page — if a file exists
# at the `from` path, Netlify serves it instead of redirecting. Netlify matches
# redirects trailing-slash-insensitively, so each rule covers both `/path` and
# `/path/`.
#
# ⚠ THIS MAP IS INCOMPLETE — it will be completed from Simon's Google Search
#   Console export (top legacy URLs by traffic/impressions) BEFORE launch. Known
#   categories still to map:
#     - Event pages under /tour/ or /event/ (ABBA, Elvis, Dolly, Diana Ross,
#       Rollin'/Tina, Soul, Swinging, party nights, kids events, seasonal specials,
#       Christmas/Santa variants …) → their /cruises/[slug] or SEO pages
#     - Blog / news / editorial posts, if the old site had any → /discover or events
#     - Info / utility pages under old Craft paths (about, contact, FAQ, gift
#       vouchers, private hire, accessibility, plan-your-visit, vessels, gallery …)
#   See docs/launch-checklist.md → "URL redirect map".

[[redirects]]
  from = "/tour/city-river-tours"
  to = "/city-river-tour"
  status = 301

# Points directly at the live /boat-to-old-trafford page (NOT via /mufc-ferry) so
# there is no redirect chain.
[[redirects]]
  from = "/tour/boat-to-old-trafford"
  to = "/boat-to-old-trafford"
  status = 301

[[redirects]]
  from = "/tour/father-christmas-cruise"
  to = "/cruises/santa-cruise"
  status = 301

[[redirects]]
  from = "/our-events"
  to = "/events"
  status = 301

# --- Ferry section rename (301): /mufc-ferry → /boat-to-old-trafford ----------
# The matchday ferry section was renamed to the keyword-exact, trademark-free
# slug. These point straight at the NEW pages (no chains) and are trailing-slash
# tolerant. (The legacy /tour/boat-to-old-trafford rule above also targets the new
# page directly, so it doesn't chain through here.)
[[redirects]]
  from = "/mufc-ferry"
  to = "/boat-to-old-trafford"
  status = 301

[[redirects]]
  from = "/mufc-ferry/ralli-quay"
  to = "/boat-to-old-trafford/ralli-quay"
  status = 301

[[redirects]]
  from = "/mufc-ferry/stephensons-bridge"
  to = "/boat-to-old-trafford/stephensons-bridge"
  status = 301

# --- Security headers (all paths) ---------------------------------------------
# The Content-Security-Policy is built from what the site actually loads (audited
# from the built HTML). Each allowance:
#   script-src : 'self' (Astro's bundled JS); cdn.checkout.ventrata.com (checkout
#                widget); unpkg.com (Leaflet 1.9.4 CSS/JS used by the route + ferry
#                maps); www.googletagmanager.com (GTM, wired later). The six sha256
#                hashes are Astro's INLINE scripts: the Ventrata-modal observer, the
#                What's On filter, the two Leaflet inits, and the contact +
#                private-hire form success reveals. No 'unsafe-inline'.
#                ⚠ Regenerate a hash if its inline script changes — audit with:
#                node -e "const fs=require('fs'),p=require('path'),c=require('crypto');(function w(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const f=p.join(d,e.name);if(e.isDirectory())w(f);else if(f.endsWith('.html'))for(const m of fs.readFileSync(f,'utf8').matchAll(/<script\b([^>]*)>([\s\S]*?)<\/script>/gi)){if(/\bsrc=|ld\+json/.test(m[1]))continue;console.log('sha256-'+c.createHash('sha256').update(m[2]).digest('base64'))}}})('dist')" | sort -u
#   style-src  : 'unsafe-inline' is required — inline style="" attributes and
#                Leaflet's JS-injected marker styles can't be hashed (low risk for
#                styles). unpkg.com serves Leaflet's stylesheet (leaflet.css) — without
#                it the map tiles render scattered/unpositioned. (Fonts are self-hosted,
#                so no Google Fonts stylesheet origin is needed.)
#   img-src    : self; data: (Leaflet controls); tile.openstreetmap.org (map tiles);
#                optimise2.assets-servd.host (TEMP hotlinked What's On images — drop
#                when self-hosted); ventrata + GTM/GA beacons.
#   font-src   : self only — Inter woff2 is self-hosted from /fonts/ (no Google Fonts CDN).
#   connect-src: self (/.netlify/functions proxies); api.ventrata.com +
#                cdn.checkout.ventrata.com + *.ventrata.com (the checkout widget
#                XHRs to further checkout.ventrata.com sub-origins beyond the CDN —
#                the wildcard covers them so the widget doesn't hang on its spinner);
#                GTM/GA (later).
#   frame-src  : Ventrata checkout iframes (cdn.checkout + *.ventrata.com for the
#                checkout/payment frames); GTM noscript iframe.
#   object-src 'none'; base-uri 'self'; form-action 'self' (Netlify Forms are
#   same-origin); frame-ancestors 'none' (mirrors X-Frame-Options).
# ⚠ The LIVE Ventrata checkout (currently test/placeholder) may need payment-
#   processor origins (Stripe, Apple Pay, 3-D Secure frames/workers). Re-validate
#   this CSP during live-checkout QA — consider Report-Only mode while testing.
#
# Report-Only until live-checkout QA; collect real violations, complete the origin
# list, then re-enforce — see launch checklist. The policy is emitted as
# Content-Security-Policy-Report-Only so it NEVER blocks a resource: the browser
# reports what WOULD have been blocked (to the console / any report-uri) but loads
# it anyway. This unblocks staging QA (the widget spinner and Leaflet map were
# being broken by an over-strict enforced policy) while we gather the true origin
# list from real checkout/payment traffic. Re-enforcement is a launch blocker —
# see docs/launch-checklist.md → "Re-enforce Content-Security-Policy".
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' https://cdn.checkout.ventrata.com https://unpkg.com https://www.googletagmanager.com 'sha256-Cj3srLBQY5lfMIkYVWwpCIdsVAU0CIrHEOoAp1t6rGI=' 'sha256-OEdWaK1xkzztypcSbAY6orLcxm0Shn5ZdtweyF8ndMc=' 'sha256-a6M7W2m2norr1ec6Pe3NGcHfQn+geKiKpToxIbslI4M=' 'sha256-f5yfxw++p/treber8qTOWs/piZsTEauvxWyZXXlj5Uw=' 'sha256-nDg10GKA5OMDMIPPaD0f2NoUEnsHrAPdhcRFr8MFk0Q=' 'sha256-xsxCcGvieqKvl/XM4KtLiO5nSu97ySvf7LRYnG3bIi0='; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://tile.openstreetmap.org https://optimise2.assets-servd.host https://cdn.checkout.ventrata.com https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self'; connect-src 'self' https://api.ventrata.com https://cdn.checkout.ventrata.com https://*.ventrata.com https://www.googletagmanager.com https://www.google-analytics.com; frame-src 'self' https://cdn.checkout.ventrata.com https://*.ventrata.com https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# --- Keystatic CMS admin: never index -----------------------------------------
# The admin UI (/keystatic) + API (/api/keystatic) and the /admin redirect are gated by
# GitHub auth in production. X-Robots-Tag is belt-and-suspenders alongside public/robots.txt
# and the sitemap filter (astro.config.mjs). NOTE: the site-wide CSP above is Report-Only, so
# it does NOT block the React admin UI today. When the CSP is enforced at launch, the admin
# needs its own relaxed policy (it loads React + talks to github.com / api.github.com for
# OAuth + commits) — see docs/content-management.md → "CSP at enforcement".
[[headers]]
  for = "/keystatic/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# --- Staging / non-production: keep crawlers out -------------------------------
# Netlify's [[headers]] cannot be scoped per deploy context, so instead we append
# a _headers rule (X-Robots-Tag: noindex, applied to every path) ONLY for
# preview and branch deploys. Production uses the plain [build] command above and
# is therefore left indexable.
[context.deploy-preview]
  command = '''npm run build && printf '/*\n  X-Robots-Tag: noindex\n' >> dist/_headers'''

[context.branch-deploy]
  command = '''npm run build && printf '/*\n  X-Robots-Tag: noindex\n' >> dist/_headers'''
