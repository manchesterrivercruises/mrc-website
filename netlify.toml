[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# OCTO API proxy functions will live here (see build sequence step 7).
[functions]
  directory = "netlify/functions"

# --- Security headers (all paths) ---------------------------------------------
# The Content-Security-Policy is built from what the site actually loads (audited
# from the built HTML). Each allowance:
#   script-src : 'self' (Astro's bundled JS); cdn.checkout.ventrata.com (checkout
#                widget); unpkg.com (Leaflet 1.9.4 CSS/JS used by the route + ferry
#                maps); www.googletagmanager.com (GTM, wired later). The six sha256
#                hashes are Astro's INLINE scripts: the Ventrata-modal observer, the
#                What's On filter, the two Leaflet inits, and the contact +
#                private-hire form success reveals. No 'unsafe-inline'.
#                ⚠ Regenerate a hash if its inline script changes — audit with:
#                node -e "const fs=require('fs'),p=require('path'),c=require('crypto');(function w(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const f=p.join(d,e.name);if(e.isDirectory())w(f);else if(f.endsWith('.html'))for(const m of fs.readFileSync(f,'utf8').matchAll(/<script\b([^>]*)>([\s\S]*?)<\/script>/gi)){if(/\bsrc=|ld\+json/.test(m[1]))continue;console.log('sha256-'+c.createHash('sha256').update(m[2]).digest('base64'))}}})('dist')" | sort -u
#   style-src  : 'unsafe-inline' is required — inline style="" attributes and
#                Leaflet's JS-injected marker styles can't be hashed (low risk for
#                styles). fonts.googleapis.com serves the Google Fonts stylesheet.
#   img-src    : self; data: (Leaflet controls); tile.openstreetmap.org (map tiles);
#                optimise2.assets-servd.host (TEMP hotlinked What's On images — drop
#                when self-hosted); ventrata + GTM/GA beacons.
#   font-src   : fonts.gstatic.com (Google Fonts files).
#   connect-src: self (/.netlify/functions proxies); api.ventrata.com +
#                cdn.checkout.ventrata.com (widget); GTM/GA (later).
#   frame-src  : Ventrata checkout iframes; GTM noscript iframe.
#   object-src 'none'; base-uri 'self'; form-action 'self' (Netlify Forms are
#   same-origin); frame-ancestors 'none' (mirrors X-Frame-Options).
# ⚠ The LIVE Ventrata checkout (currently test/placeholder) may need payment-
#   processor origins (Stripe, Apple Pay, 3-D Secure frames/workers). Re-validate
#   this CSP during live-checkout QA — consider Report-Only mode while testing.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.checkout.ventrata.com https://unpkg.com https://www.googletagmanager.com 'sha256-Cj3srLBQY5lfMIkYVWwpCIdsVAU0CIrHEOoAp1t6rGI=' 'sha256-OEdWaK1xkzztypcSbAY6orLcxm0Shn5ZdtweyF8ndMc=' 'sha256-a6M7W2m2norr1ec6Pe3NGcHfQn+geKiKpToxIbslI4M=' 'sha256-f5yfxw++p/treber8qTOWs/piZsTEauvxWyZXXlj5Uw=' 'sha256-nDg10GKA5OMDMIPPaD0f2NoUEnsHrAPdhcRFr8MFk0Q=' 'sha256-xsxCcGvieqKvl/XM4KtLiO5nSu97ySvf7LRYnG3bIi0='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://tile.openstreetmap.org https://optimise2.assets-servd.host https://cdn.checkout.ventrata.com https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.ventrata.com https://cdn.checkout.ventrata.com https://www.googletagmanager.com https://www.google-analytics.com; frame-src 'self' https://cdn.checkout.ventrata.com https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# --- Staging / non-production: keep crawlers out -------------------------------
# Netlify's [[headers]] cannot be scoped per deploy context, so instead we append
# a _headers rule (X-Robots-Tag: noindex, applied to every path) ONLY for
# preview and branch deploys. Production uses the plain [build] command above and
# is therefore left indexable.
[context.deploy-preview]
  command = '''npm run build && printf '/*\n  X-Robots-Tag: noindex\n' >> dist/_headers'''

[context.branch-deploy]
  command = '''npm run build && printf '/*\n  X-Robots-Tag: noindex\n' >> dist/_headers'''
